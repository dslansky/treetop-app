<title>Treetop ABA — App Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f0f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px 8px; }
.mode-tabs { display: flex; gap: 0; margin-bottom: 12px; border-radius: 10px; overflow: hidden; border: 2px solid #551d57; }
.mode-tab { padding: 8px 24px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
.mode-tab.active-parent { background: #551d57; color: #fff; }
.mode-tab.active-staff { background: #78C3E2; color: #1A1D23; }
.mode-tab.inactive { background: #fff; color: #888; }
.screen-btns { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; max-width: 420px; margin-bottom: 12px; }
.screen-btn { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; border: 1px solid #ddd; cursor: pointer; }
.screen-btn.active { color: #fff; }
.phone { width: 375px; height: 740px; border-radius: 40px; background: #000; padding: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); position: relative; }
.phone-inner { width: 100%; height: 100%; border-radius: 34px; overflow: hidden; position: relative; background: #fff; }
.notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 28px; background: #000; border-radius: 14px; z-index: 100; }
.status-bar { position: absolute; top: 0; left: 0; right: 0; height: 44px; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
.screen-area { padding-top: 44px; height: calc(100% - 44px); overflow: hidden; }
</style>
